<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱日记 - 治愈系互动故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffecd2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.5s ease;
            position: relative;
            overflow-x: hidden;
        }

        body.cold-mood {
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 50%, #a8c0ff 100%);
        }

        body.dark-mood {
            background: linear-gradient(135deg, #434343 0%, #000000 100%);
        }

        body.warm-glow {
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
        }

        .box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 35px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(252, 182, 159, 0.3);
            position: relative;
            z-index: 10;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #d46b4f;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            text-align: center;
            color: #999;
            margin-bottom: 25px;
        }

        .progress {
            font-size: 14px;
            color: #d46b4f;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question {
            font-size: 17px;
            color: #333;
            line-height: 1.7;
            margin-bottom: 25px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            padding: 14px 18px;
            background: #fff5f0;
            border: 2px solid #ffe0d0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            color: #555;
            text-align: center;
        }

        .option:hover {
            background: #ffe0d0;
            border-color: #ffb399;
            transform: translateY(-2px);
        }

        .option.selected {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-color: #ff9a9e;
            color: #fff;
            font-weight: 500;
        }

        .option.locked {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .prev-btn {
            background: #f0f0f0;
            color: #666;
        }

        .prev-btn:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .next-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
        }

        .next-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 154, 158, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 爱心飘落效果 */
        .heart {
            position: fixed;
            font-size: 20px;
            color: #ff6b9d;
            pointer-events: none;
            z-index: 100;
            animation: heartFall linear forwards;
        }

        @keyframes heartFall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 消息弹窗 */
        .message-popup {
            position: fixed;
            top: 30px;
            right: -300px;
            background: #fff;
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: right 0.5s ease;
            max-width: 280px;
        }

        .message-popup.show {
            right: 30px;
        }

        .message-popup .msg-header {
            font-size: 13px;
            color: #999;
            margin-bottom: 5px;
        }

        .message-popup .msg-content {
            font-size: 15px;
            color: #333;
        }

        /* 心跳效果 */
        .heartbeat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background: rgba(0, 0, 0, 0);
            transition: background 0.1s ease;
        }

        .heartbeat-overlay.beat {
            background: rgba(0, 0, 0, 0.15);
        }

        /* 模糊对话文字 */
        .float-text {
            position: fixed;
            color: rgba(100, 100, 100, 0.4);
            font-size: 14px;
            pointer-events: none;
            z-index: 50;
            filter: blur(1px);
        }

        /* 被发现效果 */
        .caught-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .caught-text {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            animation: shake 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 文字颤抖效果 */
        .tremble {
            animation: tremble 0.1s infinite;
        }

        @keyframes tremble {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        /* 暖光效果 */
        .warm-glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.3) 0%, rgba(255, 180, 100, 0.2) 50%, transparent 70%);
            z-index: 50;
            pointer-events: none;
            animation: glowExpand 2s ease forwards;
        }

        @keyframes glowExpand {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 开始模态框 */
        .start-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 236, 210, 0.98);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .start-text {
            font-size: 18px;
            color: #d46b4f;
            text-align: center;
            line-height: 2;
            margin-bottom: 30px;
            max-width: 400px;
        }

        .start-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 154, 158, 0.4);
        }

        .start-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(252, 182, 159, 0.4);
        }

        /* 结局模态框 */
        .end-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            animation: fadeIn 1s ease;
        }

        .end-title {
            font-size: 28px;
            font-weight: bold;
            color: #d46b4f;
            margin-bottom: 20px;
        }

        .end-content {
            font-size: 16px;
            color: #666;
            line-height: 2;
            text-align: center;
            max-width: 450px;
            margin-bottom: 30px;
        }

        .end-image {
            width: 250px;
            height: 180px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        /* 玩前须知 */
        .notice-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 236, 210, 0.98);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .notice-title {
            font-size: 22px;
            font-weight: bold;
            color: #d46b4f;
            margin-bottom: 20px;
        }

        .notice-content {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            text-align: center;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .notice-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .notice-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 154, 158, 0.4);
        }

        /* 打字效果 */
        .typing-text {
            overflow: hidden;
            white-space: pre-wrap;
        }

        /* 提交模态框 */
        .submit-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 236, 210, 0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .submit-modal-inner {
            background: #fff;
            padding: 35px 30px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .submit-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 154, 158, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 信任度进度条 */
        .trust-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .trust-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9a9e, #fecfef);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* 隐藏元素 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .box {
                padding: 30px 20px;
            }
            .title {
                font-size: 20px;
            }
            .question {
                font-size: 16px;
            }
            .option {
                font-size: 14px;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 玩前须知 -->
    <div class="notice-modal" id="noticeModal">
        <div class="notice-title">💝 恋爱日记</div>
        <div class="notice-content">
            这是一个关于爱与信任的治愈系互动故事<br><br>
            你将经历一段甜蜜又略带波折的恋爱旅程<br>
            请根据你的真实感受做出选择<br>
            你的每一个选择都会影响故事的结局<br><br>
            <span style="color: #d46b4f; font-size: 13px;">✨ 建议打开声音获得完整体验</span>
        </div>
        <button class="notice-btn" id="noticeBtn">开始故事</button>
    </div>

    <!-- 主问卷盒子 -->
    <div class="box" id="mainBox" style="display: none;">
        <div class="title">恋爱日记</div>
        <div class="subtitle">一个关于爱与信任的治愈故事</div>
        <div class="progress" id="progress">第 1 题 / 共 15 题</div>
        <div class="trust-bar">
            <div class="trust-fill" id="trustFill" style="width: 50%;"></div>
        </div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div class="btn-group">
            <button class="btn prev-btn" id="prevBtn" disabled>上一题</button>
            <button class="btn next-btn" id="nextBtn">下一题</button>
        </div>
    </div>

    <script>
        // ==================== 问题数据 ====================
        const questions = [
            {
                q: "1. 你和TA是怎么认识的？",
                opt: ["朋友聚会上，一眼就注意到了彼此", "工作/学习中慢慢熟悉，日久生情", "通过朋友介绍，觉得还不错就试试", "网上认识的，聊得很投机就见面了"]
            },
            {
                q: "2. 第一次约会时，你最印象深刻的是什么？",
                opt: ["TA看你的眼神，温柔得像要化了", "TA贴心地记得你说过的小细节", "你们聊了整整一晚上，完全不觉得累", "分开时TA依依不舍的样子"]
            },
            {
                q: "3. 在一起后，TA记得你的喜好吗？",
                opt: ["全都记得，比我自己还清楚", "大部分都记得，偶尔会忘", "只记得一些重要的", "不太记得，需要经常提醒"]
            },
            {
                q: "4. 最近TA好像变得有点忙，消息也回得慢了，你觉得？",
                opt: ["应该是工作/学习真的很忙吧", "可能有什么事瞒着我", "无所谓，各自有各自的空间", "有点不安，但还是选择相信TA"]
            },
            {
                q: "5. 正一起吃饭时，TA的手机突然响了，TA看了一眼就按掉了，你会？",
                opt: ["不问，每个人都有自己的隐私", "随口问一句是谁啊", "心里有点介意，但不说出来", "直接拿过手机看看是谁"]
            },
            {
                q: "6. TA很晚才回家，身上有淡淡的陌生香水味，你会？",
                opt: ["直接问TA今天去哪了", "心里怀疑，但先观察观察", "可能是挤地铁/公交蹭到的吧", "肯定有问题，我要查清楚"]
            },
            {
                q: "7. 你在柜子深处发现了一个精致的小盒子，TA没告诉过你，你会？",
                opt: ["等TA自己告诉我", "好奇地打开看看", "心里有点慌，是不是有什么事", "直接拿着盒子去问TA"]
            },
            {
                q: "8. TA最近经常躲在阳台打电话，看到你过来就挂了，你觉得？",
                opt: ["可能是工作上的事，不想让我担心", "肯定有什么事瞒着我", "也许是在给我准备惊喜？", "很不安，TA是不是不爱我了"]
            },
            {
                q: "9. 你问TA最近到底在忙什么，TA支支吾吾说不清楚，你会？",
                opt: ["等TA想说的时候自然会说", "虽然难过，但选择相信TA", "一定有问题，我要查清楚", "很生气，觉得TA不信任我"]
            },
            {
                q: "10. TA洗澡时手机放在外面，你会偷偷看吗？",
                opt: ["绝对不会，这是基本的信任", "有点好奇，但还是忍住了", "偷偷看一眼，就看一眼", "必须看，我要知道真相"]
            },
            {
                q: "11. 你在TA手机里看到了一张TA和一个异性的合照，看起来很亲密，你会？",
                opt: ["先冷静下来，听TA怎么解释", "直接质问TA这是谁", "心里很难过，偷偷哭", "肯定是出轨了，我要分手"]
            },
            {
                q: "12. 你决定和TA摊牌，你会怎么说？",
                opt: ["心平气和地问清楚事情的真相", "带着情绪质问TA为什么骗我", "先冷战，等TA主动来找我", "直接说分手，不想听解释"]
            },
            {
                q: "13. TA说要带你去一个地方，说去了就知道了，你会？",
                opt: ["虽然好奇，但还是跟着去", "心里有点忐忑，但选择相信", "一路上都在胡思乱想", "不想去，就要现在说清楚"]
            },
            {
                q: "14. TA蒙住你的眼睛，带你走到一个地方，摘下眼罩的那一刻...",
                opt: ["你看到了什么？", "准备好了吗？", "深呼吸...", "答案即将揭晓..."]
            },
            {
                q: "15. 原来...",
                opt: ["查看结局", "看看TA的答案", "揭晓真相", "故事的结局"]
            }
        ];

        // ==================== 全局变量 ====================
        let current = 0;
        let answers = Array(questions.length).fill(null);
        let trustScore = 50; // 信任度 0-100
        let peeked = false; // 是否偷看了手机
        const total = questions.length;

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const optionsEl = document.getElementById('options');
        const mainBox = document.getElementById('mainBox');
        const progressEl = document.getElementById('progress');
        const questionEl = document.getElementById('question');
        const trustFill = document.getElementById('trustFill');

        // 图片素材
        const images = {
            start: 'https://aka.doubaocdn.com/s/ww9V1wev1w',
            sweet: 'https://aka.doubaocdn.com/s/2mXW1wev1w',
            proposal: 'https://aka.doubaocdn.com/s/8ns41wev1w',
            couple: 'https://aka.doubaocdn.com/s/xAyP1wev1w'
        };

        // ==================== 背景音乐（Web Audio API生成） ====================
        let audioContext;
        let bgmInterval;

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(frequency, duration, delay = 0) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0, audioContext.currentTime + delay);
            gainNode.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + delay + 0.05);
            gainNode.gain.linearRampToValueAtTime(0.05, audioContext.currentTime + delay + duration - 0.1);
            gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + delay + duration);
            
            oscillator.start(audioContext.currentTime + delay);
            oscillator.stop(audioContext.currentTime + delay + duration);
        }

        function startBGM() {
            if (!audioContext) initAudio();
            
            // 简单的治愈系旋律（C大调）
            const melody = [
                { note: 523.25, dur: 0.5 }, // C5
                { note: 587.33, dur: 0.5 }, // D5
                { note: 659.25, dur: 0.5 }, // E5
                { note: 783.99, dur: 1 },   // G5
                { note: 659.25, dur: 0.5 }, // E5
                { note: 587.33, dur: 0.5 }, // D5
                { note: 523.25, dur: 1 },   // C5
                { note: 0, dur: 0.5 },      // 休止
            ];
            
            let time = 0;
            bgmInterval = setInterval(() => {
                melody.forEach((m, i) => {
                    if (m.note > 0) {
                        playNote(m.note, m.dur * 0.9, time + i * 0.5);
                    }
                });
                time += melody.length * 0.5;
            }, melody.length * 500);
        }

        function playSound(type) {
            if (!audioContext) return;
            
            switch(type) {
                case 'click':
                    playNote(800, 0.1);
                    break;
                case 'heart':
                    playNote(600, 0.15);
                    setTimeout(() => playNote(500, 0.15), 150);
                    break;
                case 'surprise':
                    playNote(523, 0.15);
                    setTimeout(() => playNote(659, 0.15), 150);
                    setTimeout(() => playNote(784, 0.3), 300);
                    break;
                case 'sad':
                    playNote(400, 0.3);
                    break;
            }
        }

        // ==================== 特殊效果函数 ====================

        // 爱心飘落效果（第1题）
        function startHeartRain() {
            const hearts = ['❤️', '💕', '💗', '💖', '💝', '🌸'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.fontSize = (15 + Math.random() * 20) + 'px';
                    heart.style.animationDuration = (3 + Math.random() * 3) + 's';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 6000);
                }, i * 100);
            }
        }

        // 选项变甜蜜昵称（第3题）
        function sweetOptionEffect() {
            const opts = document.querySelectorAll('.option');
            const sweetTexts = ['小宝贝', '亲爱的', '我的唯一', '小可爱'];
            
            opts.forEach((opt, idx) => {
                setTimeout(() => {
                    opt.style.transition = 'all 0.5s ease';
                    opt.style.background = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)';
                    opt.style.color = '#fff';
                    opt.innerText = sweetTexts[idx];
                }, idx * 300 + 500);
            });
            
            setTimeout(() => {
                opts.forEach((opt, idx) => {
                    setTimeout(() => {
                        opt.innerText = questions[2].opt[idx];
                        opt.style.background = '';
                        opt.style.color = '';
                    }, idx * 200);
                });
            }, 2500);
        }

        // 消息弹窗效果（第5题）
        function showMessagePopup() {
            const popup = document.createElement('div');
            popup.className = 'message-popup';
            popup.innerHTML = `
                <div class="msg-header">📱 未知号码</div>
                <div class="msg-content">事情都安排好了，放心</div>
            `;
            document.body.appendChild(popup);
            
            setTimeout(() => popup.classList.add('show'), 500);
            setTimeout(() => {
                popup.classList.remove('show');
                setTimeout(() => popup.remove(), 500);
            }, 3500);
            
            playSound('click');
        }

        // 心跳效果（第6题）
        function startHeartbeat() {
            const overlay = document.createElement('div');
            overlay.className = 'heartbeat-overlay';
            document.body.appendChild(overlay);
            
            document.body.classList.add('dark-mood');
            
            let beats = 0;
            const interval = setInterval(() => {
                overlay.classList.add('beat');
                playSound('heart');
                setTimeout(() => overlay.classList.remove('beat'), 100);
                beats++;
                
                if (beats >= 6) {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.remove();
                        document.body.classList.remove('dark-mood');
                    }, 500);
                }
            }, 600);
        }

        // 模糊对话文字（第8题）
        function floatDialogue() {
            const dialogues = [
                '...准备好了吗...',
                '...别让TA知道...',
                '...到时候给个惊喜...',
                '...一定要保密...',
                '...TA会喜欢的...',
                '...就快好了...'
            ];
            
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const text = document.createElement('div');
                    text.className = 'float-text';
                    text.innerText = dialogues[Math.floor(Math.random() * dialogues.length)];
                    text.style.left = (10 + Math.random() * 80) + '%';
                    text.style.top = (10 + Math.random() * 80) + '%';
                    text.style.fontSize = (12 + Math.random() * 8) + 'px';
                    document.body.appendChild(text);
                    
                    setTimeout(() => text.remove(), 3000);
                }, i * 200);
            }
            
            setTimeout(() => {
                document.querySelectorAll('.float-text').forEach(el => el.remove());
            }, 5000);
        }

        // 被发现效果（第10题，选择偷看）
        function caughtEffect() {
            const mask = document.createElement('div');
            mask.className = 'caught-mask';
            mask.innerHTML = '<div class="caught-text">你在做什么？<br><br>...你不相信我吗...</div>';
            document.body.appendChild(mask);
            
            playSound('sad');
            
            setTimeout(() => {
                mask.remove();
            }, 2500);
        }

        // 文字颤抖效果（第12题）
        function trembleEffect() {
            questionEl.classList.add('tremble');
            setTimeout(() => questionEl.classList.remove('tremble'), 1500);
        }

        // 暖光反转效果（第14题）
        function warmGlowEffect() {
            document.body.classList.add('warm-glow');
            
            const glow = document.createElement('div');
            glow.className = 'warm-glow-overlay';
            document.body.appendChild(glow);
            
            playSound('surprise');
            
            setTimeout(() => {
                glow.remove();
            }, 3000);
        }

        // ==================== 渲染问题 ====================
        function renderQuestion() {
            const q = questions[current];
            progressEl.innerText = `第 ${current + 1} 题 / 共 ${total} 题`;
            questionEl.innerText = q.q;
            optionsEl.innerHTML = '';
            trustFill.style.width = trustScore + '%';
            
            q.opt.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                if (answers[current] === idx) div.classList.add('selected');
                div.innerText = item;
                
                div.onclick = () => {
                    answers[current] = idx;
                    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                    div.classList.add('selected');
                    playSound('click');
                    
                    // 更新信任度
                    updateTrustScore(current, idx);
                    
                    // 特殊效果触发
                    triggerEffect(current, idx);
                };
                
                optionsEl.appendChild(div);
            });
            
            prevBtn.disabled = current === 0;
            nextBtn.innerText = current === total - 1 ? '查看结局' : '下一题';
            
            // 进入题目时的效果
            triggerEnterEffect(current);
        }

        // 更新信任度
        function updateTrustScore(qIndex, optIndex) {
            // 信任度变化规则
            const trustChanges = {
                3: [10, 5, 0, -5],    // 第4题
                4: [5, 0, -5, -15],   // 第5题
                5: [0, -5, 5, -15],   // 第6题
                6: [10, -5, -10, -15], // 第7题
                7: [5, -10, 10, -15], // 第8题
                8: [10, 5, -15, -10], // 第9题
                9: [15, 5, -10, -20], // 第10题
                10: [5, -5, -10, -20], // 第11题
                11: [10, -5, -10, -15], // 第12题
                12: [10, 5, -5, -15],  // 第13题
            };
            
            if (trustChanges[qIndex]) {
                trustScore += trustChanges[qIndex][optIndex];
                trustScore = Math.max(0, Math.min(100, trustScore));
            }
            
            // 记录是否偷看
            if (qIndex === 9 && optIndex >= 2) {
                peeked = true;
            }
        }

        // 进入题目时的效果
        function triggerEnterEffect(qIndex) {
            switch(qIndex) {
                case 0: // 第1题
                    startHeartRain();
                    break;
                case 2: // 第3题
                    setTimeout(sweetOptionEffect, 800);
                    break;
                case 5: // 第6题
                    setTimeout(startHeartbeat, 500);
                    break;
                case 7: // 第8题
                    setTimeout(floatDialogue, 500);
                    break;
                case 11: // 第12题
                    setTimeout(trembleEffect, 300);
                    document.body.classList.add('cold-mood');
                    break;
                case 13: // 第14题
                    setTimeout(warmGlowEffect, 500);
                    document.body.classList.remove('cold-mood');
                    break;
            }
        }

        // 选择选项后的效果
        function triggerEffect(qIndex, optIndex) {
            switch(qIndex) {
                case 4: // 第5题
                    if (optIndex <= 1) {
                        setTimeout(showMessagePopup, 500);
                    }
                    break;
                case 9: // 第10题
                    if (optIndex >= 2) {
                        setTimeout(caughtEffect, 300);
                    }
                    break;
            }
        }

        // ==================== 按钮事件 ====================
        prevBtn.onclick = () => {
            if (current > 0) {
                current--;
                renderQuestion();
                playSound('click');
            }
        };

        nextBtn.onclick = () => {
            playSound('click');
            
            if (current < total - 1) {
                current++;
                renderQuestion();
            } else {
                showEnding();
            }
        };

        // ==================== 结局 ====================
        function showEnding() {
            mainBox.style.display = 'none';
            
            let endingType;
            let endingTitle;
            let endingContent;
            let endingImage;
            
            if (peeked) {
                // 偷看了
                if (trustScore >= 30) {
                    endingType = 'normal';
                    endingTitle = '💔 误会解开，但...';
                    endingContent = `
                        原来TA最近一直在偷偷准备你们的纪念日惊喜<br>
                        那个小盒子是给你准备的礼物<br>
                        偷偷打电话是在跟朋友商量怎么给你惊喜<br>
                        陌生香水味是陪朋友挑礼物时蹭到的<br>
                        合照是TA的表妹，很久没见了<br><br>
                        真相大白，TA笑着揉了揉你的头发<br>
                        但你看到了TA眼里一闪而过的失落<br>
                        "你...不相信我吗？"<br><br>
                        虽然误会解开了<br>
                        但有些东西，一旦有了裂痕<br>
                        就需要更多的时间去修复...<br><br>
                        <span style="color: #d46b4f;">信任是爱情的基石，一旦动摇，就需要更多努力去重建</span>
                    `;
                    endingImage = images.couple;
                } else {
                    endingType = 'sad';
                    endingTitle = '💔 遗憾结局';
                    endingContent = `
                        TA看着你，眼神里充满了失望<br>
                        "原来你从来都没有相信过我..."<br><br>
                        那个小盒子里，是准备了很久的戒指<br>
                        那些神秘的电话，是在跟朋友商量求婚的事<br>
                        身上的香水味，是陪姐姐去试香水时蹭到的<br>
                        合照里的人，是TA多年未见的表妹<br><br>
                        所有的"可疑"，都是因为爱<br>
                        但你的怀疑，让这份爱变得沉重<br><br>
                        TA说："我还是爱你的，但我需要时间想想..."<br><br>
                        <span style="color: #999;">爱情里最伤人的，不是不爱，而是不被信任</span>
                    `;
                    endingImage = images.proposal;
                }
            } else {
                // 没偷看
                if (trustScore >= 70) {
                    endingType = 'perfect';
                    endingTitle = '💕 完美结局：我愿意';
                    endingContent = `
                        摘下眼罩的那一刻<br>
                        你看到了满地的鲜花和蜡烛<br>
                        你们的朋友都在旁边笑着鼓掌<br><br>
                        TA单膝跪地，手里拿着那个精致的小盒子<br>
                        里面是一枚闪闪发光的戒指<br><br>
                        "对不起，最近让你担心了"<br>
                        "我只是想给你一个完美的惊喜"<br>
                        "谢谢你一直相信我"<br><br>
                        "你愿意...和我共度余生吗？"<br><br>
                        你笑着点头，眼泪掉了下来<br>
                        原来所有的不安，都是多余的<br>
                        TA的爱，比你想象的还要深<br><br>
                        <span style="color: #d46b4f;">✨ 信任是最好的爱情保鲜剂</span>
                    `;
                    endingImage = images.proposal;
                } else if (trustScore >= 40) {
                    endingType = 'good';
                    endingTitle = '💗 好结局：原来是惊喜';
                    endingContent = `
                        原来TA最近一直在准备你们的周年纪念惊喜<br>
                        那个小盒子是给你的礼物<br>
                        偷偷打电话是在跟朋友商量细节<br>
                        陌生香水味是陪朋友挑礼物时蹭到的<br>
                        合照是TA的表妹，很久没见了<br><br>
                        TA有点委屈地说："还想给你惊喜呢..."<br>
                        你有点不好意思地笑了<br><br>
                        虽然中间有过怀疑和不安<br>
                        但你最终选择了相信TA<br>
                        而TA，也没有辜负你的信任<br><br>
                        <span style="color: #d46b4f;">爱情里难免有误会，但沟通和信任是最好的解药</span>
                    `;
                    endingImage = images.sweet;
                } else {
                    endingType = 'normal';
                    endingTitle = '💛 普通结局：需要谈谈';
                    endingContent = `
                        真相大白，确实是你想多了<br>
                        TA只是在准备一个小小的惊喜<br><br>
                        但TA也看出来了你的不安<br>
                        "以后有什么事，直接问我好不好？"<br>
                        "不要一个人胡思乱想"<br><br>
                        你点点头，心里有点愧疚<br>
                        这段感情，好像还需要更多的磨合<br><br>
                        虽然没有完美的惊喜结局<br>
                        但你们都更了解了彼此的想法<br>
                        这也是一种成长吧<br><br>
                        <span style="color: #999;">好的爱情，需要两个人一起努力经营</span>
                    `;
                    endingImage = images.couple;
                }
            }
            
            const endModal = document.createElement('div');
            endModal.className = 'end-modal';
            endModal.innerHTML = `
                <img src="${endingImage}" class="end-image" alt="结局图片">
                <div class="end-title">${endingTitle}</div>
                <div class="end-content">${endingContent}</div>
                <button class="start-btn" id="restartBtn">再玩一次</button>
            `;
            document.body.appendChild(endModal);
            
            playSound('surprise');
            
            // 爱心飘落（好结局）
            if (endingType === 'perfect' || endingType === 'good') {
                setTimeout(startHeartRain, 500);
            }
            
            document.getElementById('restartBtn').onclick = () => {
                endModal.remove();
                restart();
            };
        }

        // ==================== 重新开始 ====================
        function restart() {
            current = 0;
            answers = Array(questions.length).fill(null);
            trustScore = 50;
            peeked = false;
            document.body.classList.remove('cold-mood', 'dark-mood', 'warm-glow');
            mainBox.style.display = 'block';
            renderQuestion();
            playSound('click');
        }

        // ==================== 开始模态框 ====================
        function openStartModal() {
            const modal = document.createElement('div');
            modal.className = 'start-modal';
            modal.innerHTML = `
                <img src="${images.start}" class="start-image" alt="恋爱日记">
                <div class="start-text" id="startText">欢迎来到恋爱日记<br>这是一个关于爱与信任的治愈故事</div>
                <button class="start-btn" id="startBtn">继续</button>
            `;
            document.body.appendChild(modal);
            
            const texts = [
                '欢迎来到恋爱日记<br>这是一个关于爱与信任的治愈故事',
                '你将经历一段甜蜜又略带波折的恋爱旅程',
                '你的每一个选择，都会影响故事的走向',
                '准备好了吗？<br>让我们开始这段治愈之旅吧~'
            ];
            
            let idx = 0;
            const textEl = document.getElementById('startText');
            const btn = document.getElementById('startBtn');
            
            btn.onclick = () => {
                idx++;
                if (idx < texts.length) {
                    textEl.innerHTML = texts[idx];
                    if (idx === texts.length - 1) {
                        btn.innerText = '开始';
                    }
                } else {
                    modal.remove();
                    mainBox.style.display = 'block';
                    renderQuestion();
                }
                playSound('click');
            };
        }

        // ==================== 初始化 ====================
        document.getElementById('noticeBtn').onclick = () => {
            document.getElementById('noticeModal').style.display = 'none';
            initAudio();
            startBGM();
            openStartModal();
        };
    </script>
</body>
</html>
